name: build_apk

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for softprops/action-gh-release to publish a Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pinned Flutter: its Android Gradle Plugin still accepts the proguard file
      # that flutter_inappwebview references. The newest stable AGP rejects it.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      # We commit only pubspec + lib + android_widget. CI regenerates android/ so
      # the Gradle scaffold matches the toolchain. flutter create never overwrites lib/.
      - name: Regenerate android platform files
        run: flutter create --org com.example --project-name ai_usage --platforms=android .

      # flutter create only puts INTERNET in the debug/profile manifests, so a
      # release APK has no network access (blank WebView, failed sync) without this.
      - name: Add INTERNET permission for release
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$M" || \
            perl -0777 -pi -e 's{(<application)}{<uses-permission android:name="android.permission.INTERNET"/>\n    $1}' "$M"
          grep -n 'uses-permission' "$M" || echo "no uses-permission found"

      # The native home screen widget lives in android_widget/ and is copied into
      # the regenerated android/ tree, then registered in the manifest by a script.
      - name: Add home screen widget (native)
        run: |
          PKG=android/app/src/main/kotlin/com/example/ai_usage
          mkdir -p "$PKG" android/app/src/main/res/layout android/app/src/main/res/xml android/app/src/main/res/drawable
          cp android_widget/*.kt "$PKG/"
          cp android_widget/usage_widget.xml android/app/src/main/res/layout/
          cp android_widget/usage_widget_info.xml android/app/src/main/res/xml/
          cp android_widget/widget_bg.xml android_widget/wbg_*.xml android/app/src/main/res/drawable/
          node android_widget/register_widget.js

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai_usage_apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish GitHub release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
