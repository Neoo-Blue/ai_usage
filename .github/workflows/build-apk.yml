name: build_apk

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for softprops/action-gh-release to publish a Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pinned Flutter: its Android Gradle Plugin still accepts the proguard file
      # that flutter_inappwebview references. The newest stable AGP rejects it.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      # We commit only pubspec + lib. CI regenerates the android/ Gradle scaffold
      # so it always matches the toolchain version, which avoids hand written
      # Gradle files drifting out of sync. flutter create never overwrites lib/.
      - name: Regenerate android platform files
        run: flutter create --org com.example --project-name ai_usage --platforms=android .

      # flutter create only puts INTERNET in the debug/profile manifests, so a
      # release APK has no network access (blank WebView, failed sync) without this.
      - name: Add INTERNET permission for release
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$M" || \
            perl -0777 -pi -e 's{(<application)}{<uses-permission android:name="android.permission.INTERNET"/>\n    $1}' "$M"
          grep -n 'uses-permission' "$M" || echo "no uses-permission found"

      # The native home screen widget lives in android_widget/ and is copied into
      # the regenerated android/ tree, then registered in the manifest.
      - name: Add home screen widget (native)
        run: |
          PKG=android/app/src/main/kotlin/com/example/ai_usage
          mkdir -p "$PKG" android/app/src/main/res/layout android/app/src/main/res/xml android/app/src/main/res/drawable
          cp android_widget/UsageWidgetProvider.kt "$PKG/"
          cp android_widget/usage_widget.xml android/app/src/main/res/layout/
          cp android_widget/usage_widget_info.xml android/app/src/main/res/xml/
          cp android_widget/widget_bg.xml android/app/src/main/res/drawable/
          node -e '
            const fs = require("fs");
            const p = "android/app/src/main/AndroidManifest.xml";
            let m = fs.readFileSync(p, "utf8");
            if (!m.includes("UsageWidgetProvider")) {
              const rec = `        <receiver android:name=".UsageWidgetProvider" android:exported="true">
            <intent-filter>
                <action android:name="android.appwidget.action.APPWIDGET_UPDATE" />
            </intent-filter>
            <meta-data android:name="android.appwidget.provider" android:resource="@xml/usage_widget_info" />
        </receiver>
    </application>`;
              m = m.replace("</application>", rec);
              fs.writeFileSync(p, m);
            }
            console.log(m.includes("UsageWidgetProvider") ? "widget receiver registered" : "FAILED to register receiver");
          '

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai_usage_apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish GitHub release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
